name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        env:
          # Served under https://<owner>.github.io/edgesmith/ — fed to Vite's
          # `base` and to React Router via import.meta.env.BASE_URL.
          VITE_BASE_PATH: /edgesmith/
          # Backend API base. The API client appends bare paths (e.g. /auth/login)
          # to this, so it MUST include the /api/v1 suffix. Override anytime via a
          # repo Actions variable (Settings → Secrets and variables → Actions →
          # Variables: VITE_API_BASE_URL); falls back to the Render backend below.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://edgesmith-backend.onrender.com/api/v1' }}
        run: npm run build

      # BrowserRouter deep-links (e.g. /edgesmith/dashboard) 404 on GitHub Pages
      # without a SPA fallback; serving index.html as 404.html fixes refreshes.
      - name: SPA fallback (404.html)
        working-directory: frontend
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
