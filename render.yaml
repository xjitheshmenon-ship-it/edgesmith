services:
  - type: web
    name: edgesmith-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edgesmith-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ALLOWED_ORIGIN
        value: https://xjitheshmenon-ship-it.github.io

databases:
  - name: edgesmith-db
    plan: free
