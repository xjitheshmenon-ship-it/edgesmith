services:
  - type: web
    name: edgesmith-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edgesmith-db-v2
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CORS_ALLOWED_ORIGIN
        value: https://xjitheshmenon-ship-it.github.io
      # Loads the demo dataset on boot. Idempotent — it seeds once, then skips
      # on every later deploy. Set to "false" (or remove) to stop seeding demo
      # data on a freshly reset database.
      - key: SEED_DEMO
        value: "true"
      # Loads 2000+ sample jobs with a pending queue at every operation.
      # Idempotent — skips once the UID table is already large. Set to "false"
      # (or remove) to stop bulk-seeding on a freshly reset database.
      - key: SEED_BULK
        value: "true"

databases:
  - name: edgesmith-db-v2
    plan: free
